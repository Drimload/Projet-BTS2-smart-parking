services:
  # Base de données PostgreSQL
  db:
    image: postgres:15
    container_name: smart-parking_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      TZ: Europe/Paris
    volumes:
      - ./data/pgdata:/var/lib/postgresql/data
      - ./services/database/init.sql:/docker-entrypoint-initdb.d/init.sql

  pgadmin:
    image: dpage/pgadmin4
    container_name: smart-parking_pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
      PGADMIN_CONFIG_SERVER_MODE: 'False'
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: 'False'
      PGADMIN_REPLACE_SERVERS_ON_STARTUP: 'True'
      PGPASS_FILE: /pgadmin4/pgpass
      TZ: Europe/Paris
    ports:
      - "5051:80"
    depends_on:
      - db
    volumes:
      - ./services/pgadmin:/var/lib/pgadmin
      - ./services/pgadmin/servers.json:/pgadmin4/servers.json:ro
      - ./services/pgadmin/pgpass:/pgadmin4/pgpass

  # Broker MQTT Mosquitto
  mqtt:
    image: eclipse-mosquitto
    container_name: smart-parking_mqtt
    restart: always
    ports:
      - "1883:1883"
    environment:
      TZ: Europe/Paris
    volumes:
      - ./services/mosquitto/config:/mosquitto/config
      - ./services/mosquitto/data:/mosquitto/data
      - ./services/mosquitto/log:/mosquitto/log

  # MQTT Listener - Smart Parking
  mqtt-listener:
    build: ./services/mqtt-listener
    container_name: smart-parking_mqtt-listener
    restart: always
    depends_on:
      - mqtt
      - db
    environment:
      - MQTT_HOST=mqtt
      - MQTT_PORT=1883
      - MQTT_TOPIC=application/#
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=${POSTGRES_DB}
      - DB_USER=${POSTGRES_USER}
      - DB_PASSWORD=${POSTGRES_PASSWORD}
      - TZ=Europe/Paris

  # Redis
  redis:
    image: redis:7-alpine
    container_name: smart-parking_redis
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD}
    environment:
      TZ: Europe/Paris
    volumes:
      - ./data/redis:/data

  # ChirpStack - Serveur LoRaWAN
  chirpstack:
    image: chirpstack/chirpstack:4
    container_name: smart-parking_chirpstack
    restart: always
    command: -c /etc/chirpstack
    volumes:
      - ./services/chirpstack/config:/etc/chirpstack
    ports:
      - "8080:8080"
    depends_on:
      - db
      - redis
      - mqtt
    environment:
      - CHIRPSTACK_POSTGRESQL_DSN=postgres://${CHIRPSTACK_DB_USER}:${CHIRPSTACK_DB_PASSWORD}@db/chirpstack?sslmode=disable
      - CHIRPSTACK_REDIS_SERVERS=redis://:${REDIS_PASSWORD}@redis/
      - CHIRPSTACK_NETWORK_NET_ID=000000
      - CHIRPSTACK_NETWORK_ENABLED_REGIONS=eu868
      - CHIRPSTACK_API_SECRET=${CHIRPSTACK_API_SECRET}
      - CHIRPSTACK_INTEGRATION_ENABLED=mqtt
      - CHIRPSTACK_INTEGRATION_MQTT_SERVER=tcp://mqtt:1883
      - TZ=Europe/Paris

  # ChirpStack Gateway Bridge
  chirpstack-gateway-bridge:
    image: chirpstack/chirpstack-gateway-bridge:4
    container_name: smart-parking_gwbridge
    restart: always
    ports:
      - "1700:1700/udp"
    volumes:
      - ./services/chirpstack/gateway-bridge:/etc/chirpstack-gateway-bridge
    depends_on:
      - mqtt
    environment:
      - INTEGRATION__MQTT__AUTH__GENERIC__SERVERS=tcp://mqtt:1883
      - INTEGRATION__MQTT__EVENT_TOPIC_TEMPLATE=eu868/gateway/{{ .GatewayID }}/event/{{ .EventType }}
      - INTEGRATION__MQTT__COMMAND_TOPIC_TEMPLATE=eu868/gateway/{{ .GatewayID }}/command/#
      - TZ=Europe/Paris

  chirpstack-rest-api:
    image: ghcr.io/chirpstack/chirpstack-rest-api:4
    container_name: smart-parking_chirpstack-rest-api
    restart: always
    command: --server chirpstack:8080 --bind 0.0.0.0:8090 --insecure
    ports:
      - "8090:8090"
    depends_on:
      - chirpstack
    environment:
      TZ: Europe/Paris

  # Homepage - Tableau de bord
  homepage:
    image: ghcr.io/gethomepage/homepage:latest
    container_name: smart-parking_homepage
    restart: always
    ports:
      - "3000:3000"
    volumes:
      - ./services/homepage/config:/app/config
      - /var/run/docker.sock:/var/run/docker.sock
    env_file:
      - .env
    environment:
      - HOMEPAGE_ALLOWED_HOSTS=*
      - HOMEPAGE_VAR_IP=${HOMEPAGE_IP}
      - TZ=Europe/Paris

  # Portainer
  portainer:
    image: portainer/portainer-ce:latest
    container_name: smart-parking_portainer
    restart: always
    ports:
      - "9000:9000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./data/portainer:/data
    environment:
      TZ: Europe/Paris

  # Application Web PHP
  webapp:
    build: ./web-app/app-php
    container_name: smart-parking_webapp
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./web-app/app-php:/var/www/html
    depends_on:
      - db
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=${POSTGRES_DB}
      - DB_USER=${POSTGRES_USER}
      - DB_PASSWORD=${POSTGRES_PASSWORD}
      - SESSION_SECRET=${SESSION_SECRET}
      - TZ=Europe/Paris

